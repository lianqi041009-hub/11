<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>加气砖 · 价格资金池</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    /* AAC 加气砖配色: 工业灰 + 砖体米白 + 钢蓝 + 警示橙 */
    --bg: #eef0f3;
    --bg2: #ffffff;
    --bg3: #e4e7ec;
    --bg-brick: #f0ebe0;     /* 砖体米白 */
    --bg-brick2: #e8e1d2;
    --card: #ffffff;
    --card2: #f4f5f8;
    --border: #d6dae2;
    --border2: #b8c0ce;
    --steel: #2c4a6b;        /* 钢蓝 (主品牌色) */
    --steel2: #3a5d82;
    --steel-light: #6e8aac;
    --concrete: #6b7280;     /* 混凝土灰 */
    --rebar: #d97706;        /* 钢筋橙 */
    --rebar2: #f59e0b;
    --safety: #ea580c;       /* 警示橙 */
    --teal: #0d9488;
    --red: #dc2626;
    --green: #16a34a;
    --text: #1a2236;
    --text2: #4b5563;
    --text3: #9ca3af;
    --shadow: 0 2px 12px rgba(44,74,107,0.08);
    --shadow2: 0 6px 24px rgba(44,74,107,0.16);
    --shadow-brick: 0 4px 16px rgba(120,100,70,0.18);
    --mono: 'Space Mono', monospace;
    --sans: 'Noto Sans SC', sans-serif;
    --display: 'Bebas Neue', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--sans); background: var(--bg); color: var(--text);
    min-height: 100vh; max-width: 480px; margin: 0 auto;
    padding-bottom: 76px; overflow-x: hidden;
    position: relative;
  }

  /* ===== 加气砖纹理背景 (微观气孔图案) ===== */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 12% 18%, rgba(180,170,150,0.08) 1.5px, transparent 2px),
      radial-gradient(circle at 45% 67%, rgba(180,170,150,0.06) 2px, transparent 2.5px),
      radial-gradient(circle at 78% 30%, rgba(180,170,150,0.07) 1.5px, transparent 2px),
      radial-gradient(circle at 22% 88%, rgba(180,170,150,0.06) 2px, transparent 2.5px),
      radial-gradient(circle at 88% 75%, rgba(180,170,150,0.07) 1.5px, transparent 2px);
    background-size: 80px 80px, 120px 120px, 100px 100px, 140px 140px, 90px 90px;
    pointer-events: none; z-index: 0;
  }
  body > * { position: relative; z-index: 1; }

  /* ===================== */
  /* 登录页 — 加气砖工业风 */
  /* ===================== */
  #loginScreen {
    position: fixed; inset: 0;
    background: linear-gradient(160deg, #2c4a6b 0%, #1e3550 35%, #0f1e30 100%);
    z-index: 999; display: flex; align-items: center; justify-content: center;
    padding: 24px; overflow: hidden;
  }
  /* 登录页背景: 浮动的加气砖块 */
  #loginScreen::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 60px 30px;
    background-position: 0 0, 30px 15px;
    opacity: 0.5;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0% { background-position: 0 0, 30px 15px; }
    100% { background-position: 60px 30px, 90px 45px; }
  }
  .floating-brick {
    position: absolute; background: linear-gradient(135deg, rgba(240,235,224,0.06), rgba(240,235,224,0.02));
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 2px;
    animation: floatBrick 14s ease-in-out infinite;
  }
  .floating-brick::after {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle at 30% 40%, rgba(0,0,0,0.15) 1px, transparent 1.5px),
                      radial-gradient(circle at 70% 65%, rgba(0,0,0,0.15) 1.5px, transparent 2px);
    background-size: 20px 20px;
  }
  .fb1 { width: 90px; height: 45px; top: 12%; left: 8%; animation-delay: 0s; }
  .fb2 { width: 70px; height: 35px; top: 25%; right: 10%; animation-delay: -3s; }
  .fb3 { width: 110px; height: 55px; bottom: 18%; left: 15%; animation-delay: -7s; }
  .fb4 { width: 80px; height: 40px; bottom: 30%; right: 8%; animation-delay: -10s; }
  @keyframes floatBrick {
    0%, 100% { transform: translate(0,0) rotate(-2deg); opacity: 0.4; }
    50% { transform: translate(8px,-12px) rotate(2deg); opacity: 0.7; }
  }

  .login-box {
    background: rgba(255,255,255,0.97); border-radius: 4px;
    padding: 40px 32px 32px;
    width: 100%; max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
    animation: loginEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative; overflow: hidden;
  }
  .login-box::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--rebar), var(--rebar2), var(--rebar));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    0% { background-position: 0% 0; }
    100% { background-position: -200% 0; }
  }
  @keyframes loginEnter {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #f0ebe0 0%, #d4cbb5 100%);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px rgba(120,100,70,0.3), inset 0 1px 0 rgba(255,255,255,0.6);
    position: relative; overflow: hidden;
    animation: brickPulse 3s ease-in-out infinite;
  }
  @keyframes brickPulse {
    0%, 100% { box-shadow: 0 8px 24px rgba(120,100,70,0.3), inset 0 1px 0 rgba(255,255,255,0.6); }
    50% { box-shadow: 0 12px 32px rgba(217,119,6,0.35), inset 0 1px 0 rgba(255,255,255,0.6); }
  }
  /* 砖体气孔纹理 */
  .login-logo-icon::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 25% 30%, rgba(120,100,70,0.4) 1.5px, transparent 2px),
      radial-gradient(circle at 70% 60%, rgba(120,100,70,0.35) 2px, transparent 2.5px),
      radial-gradient(circle at 45% 80%, rgba(120,100,70,0.3) 1.5px, transparent 2px),
      radial-gradient(circle at 80% 25%, rgba(120,100,70,0.35) 1px, transparent 1.5px);
    background-size: 100% 100%;
  }
  .login-logo-icon svg { position: relative; z-index: 1; width: 38px; height: 38px; }
  .login-logo h1 {
    font-size: 22px; font-weight: 900; color: var(--steel); letter-spacing: 1px;
  }
  .login-logo .brand-en {
    font-family: var(--display); font-size: 13px; color: var(--rebar);
    letter-spacing: 4px; margin-top: 2px;
  }
  .login-logo p {
    font-size: 12px; color: var(--text3); margin-top: 8px; letter-spacing: 0.5px;
  }
  .login-field { margin-bottom: 16px; }
  .login-field label {
    display: block; font-size: 11px; font-weight: 700; color: var(--steel);
    margin-bottom: 6px; letter-spacing: 2px;
  }
  .login-field input {
    width: 100%; padding: 13px 16px;
    border: 1.5px solid var(--border); border-radius: 4px;
    font-size: 15px; font-family: var(--sans); color: var(--text);
    background: var(--bg3); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }
  .login-field input:focus {
    border-color: var(--rebar); background: #fff;
    box-shadow: 0 0 0 3px rgba(217,119,6,0.12);
  }
  .login-btn {
    width: 100%; padding: 14px; margin-top: 12px;
    background: linear-gradient(135deg, var(--steel), var(--steel2));
    color: #fff; border: none; border-radius: 4px;
    font-size: 15px; font-weight: 700; font-family: var(--sans);
    letter-spacing: 4px; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 18px rgba(44,74,107,0.4);
    position: relative; overflow: hidden;
  }
  .login-btn::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 0; height: 0; border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
  }
  .login-btn:active::after { width: 300px; height: 300px; }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(44,74,107,0.5); }
  .login-btn:active { transform: translateY(0); }
  .login-error {
    background: rgba(220,38,38,0.06); border: 1px solid rgba(220,38,38,0.2);
    color: var(--red); border-radius: 4px; padding: 10px 14px; font-size: 13px;
    text-align: center; margin-top: 12px; display: none;
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ===================== */
  /* 主应用 */
  /* ===================== */
  #appScreen { display: none; opacity: 0; }
  #appScreen.visible { display: block; animation: appFadeIn 0.5s ease forwards; }
  @keyframes appFadeIn { to { opacity: 1; } }

  /* 头部 — 工业风钢蓝 + 砖块装饰 */
  .header {
    background: linear-gradient(135deg, var(--steel) 0%, var(--steel2) 100%);
    padding: 18px 18px 16px;
    color: #fff;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(44,74,107,0.25);
    overflow: hidden;
  }
  /* 头部装饰: 砖块叠加纹理 */
  .header::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 60px 24px;
    background-position: 0 0;
    pointer-events: none;
  }
  .header::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--rebar) 0%, var(--rebar2) 50%, var(--rebar) 100%);
    background-size: 200% 100%;
    animation: shimmer 4s linear infinite;
  }
  .header > * { position: relative; z-index: 1; }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header-brand { display: flex; align-items: center; gap: 8px; }
  .brand-logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #f0ebe0, #d4cbb5);
    border-radius: 3px; position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .brand-logo::before {
    content: ''; position: absolute; inset: 2px;
    background-image:
      radial-gradient(circle at 30% 40%, rgba(120,100,70,0.5) 1px, transparent 1.5px),
      radial-gradient(circle at 65% 60%, rgba(120,100,70,0.4) 1px, transparent 1.5px);
    background-size: 12px 12px;
  }
  .header-title {
    font-family: var(--display); font-size: 13px; color: rgba(255,255,255,0.95);
    letter-spacing: 3px; font-weight: 700;
  }
  .header-badge {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
    color: #fff; font-size: 10px; font-family: var(--mono);
    padding: 3px 10px; border-radius: 2px; font-weight: 700;
    backdrop-filter: blur(8px);
  }
  .header-badge.loaded {
    background: rgba(22,163,74,0.25); border-color: rgba(74,222,128,0.5);
    color: #bbf7d0;
  }
  .header-badge.error {
    background: rgba(220,38,38,0.25); border-color: rgba(248,113,113,0.5);
    color: #fecaca;
  }
  .header-sub {
    font-size: 19px; font-weight: 900; margin-top: 8px; color: #fff;
    letter-spacing: 1px;
  }
  .header-sub-en {
    font-family: var(--display); font-size: 10px; color: var(--rebar2);
    letter-spacing: 4px; margin-top: 2px;
  }
  .header-time {
    font-size: 10px; color: rgba(255,255,255,0.6);
    margin-top: 4px; font-family: var(--mono);
  }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .logout-btn {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
    border-radius: 3px; color: #fff; font-size: 11px;
    padding: 4px 10px; cursor: pointer;
    font-family: var(--sans); transition: all 0.15s;
    backdrop-filter: blur(8px);
  }
  .logout-btn:hover {
    background: rgba(220,38,38,0.3); border-color: rgba(248,113,113,0.6);
  }

  /* 标签栏 */
  .tabs {
    background: #fff; display: flex;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 100px; z-index: 99;
    box-shadow: 0 2px 12px rgba(44,74,107,0.06);
  }
  .tab {
    flex: 1; padding: 12px 4px; text-align: center; font-size: 12px;
    color: var(--text3); cursor: pointer;
    border-bottom: 3px solid transparent; margin-bottom: -1px;
    transition: color 0.25s, background 0.2s;
    position: relative;
  }
  .tab.active {
    color: var(--steel); border-bottom-color: var(--rebar);
    font-weight: 700;
  }
  .tab:not(.active):hover { background: rgba(44,74,107,0.04); }
  .tab-icon {
    font-size: 18px; display: block; margin-bottom: 2px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .tab.active .tab-icon { transform: scale(1.15); }

  .panel { display: none; padding: 14px; }
  .panel.active { display: block; animation: panelIn 0.4s ease; }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 加载/错误状态 — 加气砖叠放动画 */
  .loading, .error { text-align: center; padding: 60px 20px; color: var(--text2); }
  .brick-loader {
    width: 80px; height: 60px; margin: 0 auto 20px;
    position: relative;
  }
  .brick-loader .bk {
    position: absolute; width: 32px; height: 16px;
    background: linear-gradient(135deg, #f0ebe0, #d4cbb5);
    border: 1px solid #c4b89a; border-radius: 2px;
    box-shadow: 0 2px 4px rgba(120,100,70,0.25);
    animation: stackBrick 1.6s ease-in-out infinite;
  }
  .brick-loader .bk::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle at 30% 50%, rgba(120,100,70,0.4) 0.8px, transparent 1.2px);
    background-size: 8px 8px;
  }
  .brick-loader .bk:nth-child(1) { left: 0; bottom: 0; animation-delay: 0s; }
  .brick-loader .bk:nth-child(2) { left: 34px; bottom: 0; animation-delay: 0.1s; }
  .brick-loader .bk:nth-child(3) { left: 17px; bottom: 18px; animation-delay: 0.2s; }
  .brick-loader .bk:nth-child(4) { left: 51px; bottom: 18px; animation-delay: 0.3s; }
  .brick-loader .bk:nth-child(5) { left: 34px; bottom: 36px; animation-delay: 0.4s; }
  @keyframes stackBrick {
    0%, 100% { transform: translateY(0); opacity: 1; }
    50% { transform: translateY(-6px); opacity: 0.5; }
  }
  .loading-text {
    font-family: var(--mono); font-size: 12px;
    color: var(--text3); letter-spacing: 2px;
  }
  .loading-text::after {
    content: '...';
    animation: dots 1.4s steps(4) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  .error { color: var(--red); }
  .error-detail { font-size: 12px; color: var(--text2); margin-top: 10px; line-height: 1.6; }
  .error-help {
    background: #fff8f0; border: 1px solid #f5dfc6;
    border-radius: 4px; padding: 14px; margin-top: 20px;
    text-align: left; font-size: 12px; color: var(--text2); line-height: 1.7;
  }
  .error-help code {
    background: var(--bg3); padding: 2px 6px; border-radius: 3px;
    font-family: var(--mono); color: var(--rebar); font-size: 11px;
  }

  /* 摘要卡片 — 加气砖立体效果 */
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .sum-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 4px; padding: 14px 8px 12px; text-align: center;
    box-shadow: var(--shadow);
    position: relative; overflow: hidden;
    transition: transform 0.25s, box-shadow 0.25s;
    opacity: 0; transform: translateY(16px);
    animation: cardEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .sum-card:nth-child(1) { animation-delay: 0.05s; }
  .sum-card:nth-child(2) { animation-delay: 0.12s; }
  .sum-card:nth-child(3) { animation-delay: 0.19s; }
  @keyframes cardEnter {
    to { opacity: 1; transform: translateY(0); }
  }
  .sum-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow2);
  }
  .sum-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--steel);
  }
  .sum-card.gold::before { background: var(--rebar); }
  .sum-card.green::before { background: var(--green); }
  .sum-card.red::before { background: var(--red); }
  .sum-num {
    font-family: var(--mono); font-size: 19px; font-weight: 700;
    color: var(--steel); line-height: 1;
  }
  .sum-num.green { color: var(--green); }
  .sum-num.red { color: var(--red); }
  .sum-num.gold { color: var(--rebar); }
  .sum-label {
    font-size: 10px; color: var(--text2); margin-top: 5px;
    font-weight: 500; letter-spacing: 1px;
  }
  .sum-unit {
    font-size: 11px; color: var(--text3); font-weight: 400; margin-left: 2px;
  }

  /* 搜索框 */
  .search-wrap { margin-bottom: 12px; position: relative; }
  .search-input {
    width: 100%; background: #fff; border: 1.5px solid var(--border);
    border-radius: 4px; padding: 10px 14px 10px 40px; color: var(--text);
    font-size: 14px; font-family: var(--sans); outline: none;
    box-shadow: var(--shadow); transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    border-color: var(--rebar);
    box-shadow: 0 0 0 3px rgba(217,119,6,0.12);
  }
  .search-input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    font-size: 15px; color: var(--text3);
  }

  /* 客户卡片 — 砖块叠放效果 */
  .client-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 4px; margin-bottom: 10px; overflow: hidden;
    box-shadow: var(--shadow);
    transition: border-color 0.2s, box-shadow 0.25s, transform 0.2s;
    position: relative;
    opacity: 0; transform: translateY(12px);
    animation: cardEnter 0.4s ease forwards;
  }
  /* 客户卡片左侧条 — 砖体配色 */
  .client-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--steel-light);
    transition: background 0.25s, width 0.25s;
  }
  .client-card:hover::before { background: var(--rebar); width: 4px; }
  .client-card:hover { box-shadow: var(--shadow2); transform: translateY(-1px); }
  .client-card.expanded {
    border-color: var(--rebar);
    box-shadow: 0 6px 24px rgba(217,119,6,0.18);
  }
  .client-card.expanded::before { background: var(--rebar); width: 4px; }

  .client-header { display: flex; align-items: center; padding: 13px 14px; cursor: pointer; gap: 11px; }
  /* 头像 — 加气砖纹理 */
  .client-avatar {
    width: 44px; height: 44px; border-radius: 4px;
    background: linear-gradient(135deg, #f0ebe0 0%, #d4cbb5 100%);
    border: 1px solid #c4b89a;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 11px; color: var(--steel);
    font-weight: 700; flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(120,100,70,0.2), inset 0 1px 0 rgba(255,255,255,0.5);
    position: relative; overflow: hidden;
  }
  .client-avatar::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 25% 30%, rgba(120,100,70,0.35) 1px, transparent 1.5px),
      radial-gradient(circle at 70% 60%, rgba(120,100,70,0.3) 1.2px, transparent 1.8px),
      radial-gradient(circle at 45% 80%, rgba(120,100,70,0.28) 1px, transparent 1.5px);
    background-size: 100% 100%;
  }
  .client-avatar span { position: relative; z-index: 1; }
  .client-info { flex: 1; min-width: 0; }
  .client-name {
    font-weight: 700; font-size: 15px; color: var(--text);
    letter-spacing: 0.5px;
  }
  .client-meta {
    font-size: 11px; color: var(--text2); margin-top: 3px;
  }
  .client-right { text-align: right; flex-shrink: 0; margin-right: 4px; }
  .price-today {
    font-family: var(--mono); font-size: 16px; font-weight: 700;
    color: var(--steel); letter-spacing: -0.5px;
  }
  .status-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 2px;
    margin-top: 3px; display: inline-block; font-weight: 700;
    letter-spacing: 0.5px;
  }
  .status-badge.equal {
    background: rgba(22,163,74,0.1); color: var(--green);
    border: 1px solid rgba(22,163,74,0.25);
  }
  .status-badge.not-equal {
    background: rgba(220,38,38,0.09); color: var(--red);
    border: 1px solid rgba(220,38,38,0.22);
  }
  .status-badge.not-found {
    background: rgba(217,119,6,0.1); color: var(--rebar);
    border: 1px solid rgba(217,119,6,0.25);
  }
  .expand-arrow {
    color: var(--text3); font-size: 11px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .expanded .expand-arrow { transform: rotate(180deg); color: var(--rebar); }

  .client-detail {
    max-height: 0; overflow: hidden;
    border-top: 1px solid transparent;
    background: var(--bg3);
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s, border-color 0.3s;
    padding: 0 14px;
  }
  .expanded .client-detail {
    max-height: 800px; padding: 14px;
    border-top-color: var(--border);
  }
  .detail-section { margin-bottom: 14px; }
  .detail-section:last-child { margin-bottom: 0; }
  .detail-label {
    font-size: 10px; color: var(--text3); letter-spacing: 2px;
    margin-bottom: 8px; font-family: var(--mono); font-weight: 700;
  }
  .price-tiers { display: flex; gap: 6px; flex-wrap: wrap; }
  .price-tier {
    background: #fff; border: 1px solid var(--border);
    border-radius: 3px; padding: 8px 12px; text-align: center;
    box-shadow: 0 1px 4px rgba(44,74,107,0.06);
    transition: transform 0.15s;
  }
  .price-tier:hover { transform: translateY(-2px); }
  .price-tier.current {
    border-color: var(--rebar);
    background: rgba(217,119,6,0.05);
    box-shadow: 0 2px 8px rgba(217,119,6,0.15);
  }
  .tier-price {
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    color: var(--text2);
  }
  .tier-price.current { color: var(--rebar); }
  .tier-pool { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .tier-pool.positive { color: var(--teal); font-weight: 700; }
  .tier-pool.negative { color: var(--red); font-weight: 700; }
  .tier-pool.zero { color: var(--text3); }
  .kw-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .kw-badge {
    background: #fff; border: 1px solid var(--border);
    border-radius: 3px; padding: 6px 12px;
    font-family: var(--mono); font-size: 13px; color: var(--steel);
    box-shadow: 0 1px 4px rgba(44,74,107,0.06);
    font-weight: 700;
  }
  .kw-badge span { color: var(--text3); font-size: 10px; margin-right: 4px; font-weight: 400; }

  /* ===== 今日存款页 ===== */
  .deposit-hero {
    background: linear-gradient(135deg, var(--steel) 0%, var(--steel2) 100%);
    border-radius: 4px; padding: 18px 16px 16px; margin-bottom: 14px;
    color: #fff; position: relative; overflow: hidden;
    box-shadow: 0 8px 24px rgba(44,74,107,0.25);
  }
  .deposit-hero::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 40px 18px;
    pointer-events: none;
  }
  .deposit-hero::after {
    content: ''; position: absolute; right: -20px; bottom: -30px;
    width: 140px; height: 100px;
    background-image:
      radial-gradient(circle at 25% 30%, rgba(255,255,255,0.15) 2px, transparent 3px),
      radial-gradient(circle at 70% 60%, rgba(255,255,255,0.12) 2.5px, transparent 3.5px),
      radial-gradient(circle at 50% 85%, rgba(255,255,255,0.1) 2px, transparent 3px);
    background-size: 30px 30px;
    opacity: 0.5;
  }
  .deposit-hero > * { position: relative; z-index: 1; }
  .deposit-hero-label {
    font-family: var(--display); font-size: 11px;
    letter-spacing: 4px; color: var(--rebar2); margin-bottom: 4px;
  }
  .deposit-hero-title {
    font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.95);
    margin-bottom: 12px; letter-spacing: 1px;
  }
  .deposit-total {
    font-family: var(--mono); font-size: 32px; font-weight: 700;
    color: #fff; letter-spacing: -1px; line-height: 1;
  }
  .deposit-total-unit { font-size: 14px; color: var(--rebar2); margin-left: 4px; font-weight: 400; }
  .deposit-sub {
    font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 8px;
  }
  /* 数据条形图 — 砖块叠放比喻 */
  .deposit-bars {
    display: flex; align-items: flex-end; gap: 3px; height: 50px; margin-top: 14px;
  }
  .deposit-bar {
    flex: 1; background: linear-gradient(180deg, var(--rebar2), var(--rebar));
    border-radius: 2px 2px 0 0;
    min-height: 4px; position: relative;
    transform-origin: bottom;
    animation: barRise 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  }
  @keyframes barRise {
    from { transform: scaleY(0); opacity: 0; }
    to { transform: scaleY(1); opacity: 1; }
  }

  .deposit-list-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding: 0 2px;
  }
  .deposit-list-title {
    font-size: 13px; font-weight: 700; color: var(--text);
    letter-spacing: 0.5px;
  }
  .deposit-list-count {
    font-family: var(--mono); font-size: 11px; color: var(--text3);
  }

  .deposit-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 4px; margin-bottom: 8px; padding: 12px 14px;
    box-shadow: var(--shadow); position: relative;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    opacity: 0; transform: translateY(10px);
    animation: cardEnter 0.4s ease forwards;
  }
  .deposit-card::before {
    content: ''; position: absolute; left: 0; top: 12px; bottom: 12px;
    width: 3px; background: var(--steel-light); border-radius: 0 2px 2px 0;
    transition: background 0.2s, width 0.2s;
  }
  .deposit-card:hover {
    transform: translateY(-1px); box-shadow: var(--shadow2);
    border-color: var(--border2);
  }
  .deposit-card:hover::before { background: var(--rebar); width: 4px; }
  .deposit-card-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .deposit-customer {
    display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0;
  }
  .deposit-avatar {
    width: 36px; height: 36px; border-radius: 4px;
    background: linear-gradient(135deg, #f0ebe0, #d4cbb5);
    border: 1px solid #c4b89a;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 10px; color: var(--steel);
    font-weight: 700; flex-shrink: 0;
    box-shadow: 0 1px 3px rgba(120,100,70,0.2), inset 0 1px 0 rgba(255,255,255,0.5);
    position: relative; overflow: hidden;
  }
  .deposit-avatar::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 30% 40%, rgba(120,100,70,0.35) 0.8px, transparent 1.2px),
      radial-gradient(circle at 65% 65%, rgba(120,100,70,0.3) 1px, transparent 1.5px);
    background-size: 100% 100%;
  }
  .deposit-avatar span { position: relative; z-index: 1; }
  .deposit-info { flex: 1; min-width: 0; }
  .deposit-name { font-weight: 700; font-size: 14px; color: var(--text); }
  .deposit-account { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .deposit-amount {
    font-family: var(--mono); font-size: 15px; font-weight: 700;
    color: var(--green); text-align: right;
  }
  .deposit-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border);
    font-size: 11px;
  }
  .deposit-tag {
    background: var(--bg3); color: var(--text2);
    padding: 2px 8px; border-radius: 2px;
    font-family: var(--mono); font-size: 10px;
  }
  .deposit-price {
    font-family: var(--mono); color: var(--steel); font-weight: 700;
  }
  .deposit-price-label { color: var(--text3); font-weight: 400; margin-right: 4px; }

  /* 价格历史表 */
  .hist-table-wrap {
    overflow-x: auto; border-radius: 4px;
    border: 1px solid var(--border); box-shadow: var(--shadow);
    background: #fff;
  }
  .hist-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px; }
  .hist-table th {
    background: var(--steel); color: #fff; padding: 10px 12px;
    text-align: center; font-weight: 700; font-size: 11px;
    white-space: nowrap; letter-spacing: 0.5px;
    position: sticky; top: 0;
  }
  .hist-table th:first-child { text-align: left; background: var(--steel2); }
  .hist-table tr:hover td { background: rgba(217,119,6,0.04); }
  .hist-table td {
    padding: 9px 12px; text-align: center;
    border-bottom: 1px solid rgba(214,218,226,0.6);
    font-family: var(--mono); color: var(--text2);
    transition: background 0.15s;
  }
  .hist-table td:first-child {
    text-align: left; font-family: var(--sans);
    font-weight: 700; color: var(--text);
  }
  .hist-table td.current-price { color: var(--rebar); font-weight: 700; }
  .hist-table td.empty { color: var(--text3); }

  /* 底部导航 */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; background: #fff;
    border-top: 1px solid var(--border); display: flex;
    padding: 8px 0 14px; z-index: 200;
    box-shadow: 0 -4px 16px rgba(44,74,107,0.08);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; cursor: pointer; padding: 4px 0;
    transition: transform 0.15s;
    position: relative;
  }
  .nav-item:active { transform: scale(0.92); }
  .nav-icon { font-size: 20px; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .nav-label { font-size: 10px; color: var(--text3); font-weight: 500; transition: color 0.2s; }
  .nav-item.active .nav-label { color: var(--steel); font-weight: 700; }
  .nav-item.active .nav-icon { transform: translateY(-2px) scale(1.1); }
  .nav-item.active::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 28px; height: 3px; background: var(--rebar); border-radius: 0 0 2px 2px;
  }

  /* 滚动驱动动画 - 元素进入视窗 */
  .scroll-reveal {
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .scroll-reveal.in-view { opacity: 1; transform: translateY(0); }

  /* 数字计数动画占位 */
  .count-up { display: inline-block; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb:hover { background: var(--steel-light); }

  /* ===== 排行榜样式 ===== */
  .leaderboard-section {
    margin-bottom: 20px;
  }
  .lb-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; padding: 0 2px;
  }
  .lb-title {
    font-size: 16px; font-weight: 900; color: var(--text);
    letter-spacing: 1px; flex: 1;
  }
  .lb-subtitle { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  /* 冠军卡片 — 前3名特殊样式 */
  .lb-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 10px; padding: 14px 16px;
    box-shadow: var(--shadow); position: relative; overflow: visible;
    display: flex; align-items: center; gap: 12px;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: cardEnter 0.5s ease both;
  }
  .lb-card:hover { transform: translateY(-2px); box-shadow: var(--shadow2); }
  .lb-card.rank-1 {
    background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
    border-color: #f59e0b;
    box-shadow: 0 4px 20px rgba(245,158,11,0.25);
  }
  .lb-card.rank-2 {
    background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    border-color: #94a3b8;
  }
  .lb-card.rank-3 {
    background: linear-gradient(135deg, #fff7ed 0%, #fed7aa 100%);
    border-color: #f97316;
  }

  /* 排名徽章 */
  .lb-rank {
    font-family: var(--display); font-size: 22px; font-weight: 900;
    color: var(--text3); min-width: 28px; text-align: center; flex-shrink: 0;
  }
  .lb-card.rank-1 .lb-rank { color: #d97706; }
  .lb-card.rank-2 .lb-rank { color: #64748b; }
  .lb-card.rank-3 .lb-rank { color: #ea580c; }

  /* 皇冠特效容器 */
  .crown-wrapper {
    position: relative; width: 48px; height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
  }
  .crown-emoji {
    font-size: 32px; display: block;
    filter: drop-shadow(0 2px 8px rgba(245,158,11,0.5));
    transition: transform 0.15s;
    transform-origin: center bottom;
  }
  .crown-wrapper:hover .crown-emoji { transform: scale(1.1); }
  .crown-wrapper.spinning .crown-emoji {
    animation: crownSpin 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes crownSpin {
    0% { transform: rotate(0deg) scale(1); }
    30% { transform: rotate(180deg) scale(1.3); }
    70% { transform: rotate(330deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }
  /* 皇冠光晕 */
  .crown-glow {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle, rgba(251,191,36,0.3) 0%, transparent 70%);
    animation: glowPulse 2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }
  /* 星星粒子 */
  .crown-stars {
    position: absolute; inset: -10px; pointer-events: none;
  }
  .star-particle {
    position: absolute; font-size: 10px;
    animation: starOrbit linear infinite;
    opacity: 0; transform-origin: 34px 34px;
  }
  .star-particle:nth-child(1) { animation-duration: 3s; animation-delay: 0s; }
  .star-particle:nth-child(2) { animation-duration: 3s; animation-delay: -1s; }
  .star-particle:nth-child(3) { animation-duration: 3s; animation-delay: -2s; }
  @keyframes starOrbit {
    0% { opacity: 0; transform: rotate(0deg) translateX(26px) rotate(0deg) scale(0); }
    20% { opacity: 1; transform: rotate(72deg) translateX(26px) rotate(-72deg) scale(1); }
    80% { opacity: 1; transform: rotate(288deg) translateX(26px) rotate(-288deg) scale(1); }
    100% { opacity: 0; transform: rotate(360deg) translateX(26px) rotate(-360deg) scale(0); }
  }

  /* 赞美文字泡泡 */
  .praise-bubble {
    position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%) scale(0);
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: #fff; font-size: 11px; font-weight: 700;
    padding: 6px 12px; border-radius: 20px; white-space: nowrap;
    box-shadow: 0 4px 12px rgba(245,158,11,0.4);
    pointer-events: none; z-index: 99;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    opacity: 0;
  }
  .praise-bubble::after {
    content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-bottom-color: #f59e0b;
    border-top: none;
  }
  .praise-bubble.show { transform: translateX(-50%) scale(1); opacity: 1; }

  .lb-info { flex: 1; min-width: 0; }
  .lb-name {
    font-weight: 800; font-size: 15px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .lb-card.rank-1 .lb-name { color: #92400e; }
  .lb-amount {
    font-family: var(--mono); font-size: 14px; font-weight: 700;
    color: var(--green); margin-top: 2px;
  }
  .lb-amount.negative { color: var(--red); }

  /* 大便特效 */
  .poop-wrapper {
    position: relative; width: 48px; height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .poop-emoji {
    font-size: 30px; display: block;
    animation: poopWobble 1.5s ease-in-out infinite;
  }
  @keyframes poopWobble {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg) scale(1.05); }
  }
  /* 苍蝇环绕 */
  .fly-container {
    position: absolute; inset: -16px; pointer-events: none;
  }
  .fly {
    position: absolute; font-size: 13px;
    top: 50%; left: 50%;
    animation: flyAround linear infinite;
    transform-origin: 0 0;
  }
  .fly:nth-child(1) { animation-duration: 1.8s; animation-delay: 0s; }
  .fly:nth-child(2) { animation-duration: 2.2s; animation-delay: -0.7s; }
  .fly:nth-child(3) { animation-duration: 1.5s; animation-delay: -1.4s; }
  @keyframes flyAround {
    0% { transform: rotate(0deg) translateX(28px) rotate(0deg) scaleX(1); }
    50% { transform: rotate(180deg) translateX(28px) rotate(-180deg) scaleX(-1); }
    100% { transform: rotate(360deg) translateX(28px) rotate(-360deg) scaleX(1); }
  }

  /* 排行榜切换按钮 */
  .lb-toggle {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .lb-toggle-btn {
    flex: 1; padding: 10px 8px;
    background: var(--bg3); border: 1.5px solid var(--border);
    border-radius: 6px; font-size: 13px; font-weight: 700;
    color: var(--text2); cursor: pointer;
    transition: all 0.2s; text-align: center;
    font-family: var(--sans);
  }
  .lb-toggle-btn.active {
    background: var(--steel); border-color: var(--steel);
    color: #fff; box-shadow: 0 4px 12px rgba(44,74,107,0.3);
  }
  .lb-toggle-btn.active.bad {
    background: var(--red); border-color: var(--red);
    box-shadow: 0 4px 12px rgba(220,38,38,0.3);
  }

  /* 排行榜英雄区 */
  .lb-hero {
    background: linear-gradient(135deg, #1a3552 0%, #2c4a6b 100%);
    border-radius: 8px; padding: 16px; margin-bottom: 16px;
    color: #fff; text-align: center; position: relative; overflow: hidden;
  }
  .lb-hero::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle at 20% 50%, rgba(245,158,11,0.15) 0%, transparent 50%),
                      radial-gradient(circle at 80% 50%, rgba(245,158,11,0.1) 0%, transparent 50%);
  }
  .lb-hero-icon { font-size: 36px; margin-bottom: 6px; }
  .lb-hero-title { font-size: 18px; font-weight: 900; letter-spacing: 2px; }
  .lb-hero-sub { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 4px; font-family: var(--mono); }

  /* 进度条 */
  .lb-bar-wrap { margin-top: 6px; background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; }
  .lb-bar {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--green), #4ade80);
    transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .lb-bar.negative { background: linear-gradient(90deg, #ef4444, var(--red)); }

  /* ===== 游戏 CSS ===== */
  #gameContent { padding-bottom: 10px; }
  .game-header {
    background: linear-gradient(135deg, #0f1e30 0%, #1a3552 50%, #0d9488 100%);
    border-radius: 12px; padding: 18px; margin-bottom: 14px;
    color: #fff; position: relative; overflow: hidden;
    box-shadow: 0 8px 32px rgba(13,148,136,0.3);
  }
  .game-header::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 10px,
      rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px);
  }
  .game-header::after {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 120px; height: 120px; border-radius: 50%;
    background: radial-gradient(circle, rgba(13,148,136,0.4), transparent 70%);
    animation: glowOrb 3s ease-in-out infinite;
  }

<script>
// ============ 登录逻辑 ============
const CORRECT_USER = 'lianqi';
const CORRECT_PASS = 'lianqi';

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  if (u === CORRECT_USER && p === CORRECT_PASS) {
    const loginEl = document.getElementById('loginScreen');
    loginEl.style.transition = 'opacity 0.4s ease';
    loginEl.style.opacity = '0';
    setTimeout(() => {
      loginEl.style.display = 'none';
      const app = document.getElementById('appScreen');
      app.classList.add('visible');
      loadExcel();
    }, 400);
  } else {
    errEl.style.display = 'block';
    errEl.style.animation = 'none';
    void errEl.offsetWidth;
    errEl.style.animation = 'shake 0.4s';
    document.getElementById('loginPass').value = '';
    setTimeout(() => { errEl.style.display = 'none'; }, 3000);
  }
}

function doLogout() {
  const app = document.getElementById('appScreen');
  app.classList.remove('visible');
  const loginEl = document.getElementById('loginScreen');
  loginEl.style.display = 'flex';
  loginEl.style.opacity = '1';
  document.getElementById('loginUser').value = '';

const EXCEL_FILE = '11.xlsx';

let allClients = [];
let histDates = [];
let histRows = [];
let depositData = [];

// ============ 加载 Excel ============
async function loadExcel() {
  try {
    const res = await fetch(EXCEL_FILE + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });

    const sheet1Name = wb.SheetNames[0];
    const sheet1 = XLSX.utils.sheet_to_json(wb.Sheets[sheet1Name], { header: 1, defval: null });
    allClients = parseSheet1(sheet1);

    const sheet2Name = wb.SheetNames.find(n => /sheet2/i.test(n)) || wb.SheetNames[2];
    if (sheet2Name) {
      const sheet2 = XLSX.utils.sheet_to_json(wb.Sheets[sheet2Name], { header: 1, defval: null });
      parseSheet2(sheet2);
    }

    const sheet4Name = wb.SheetNames.find(n => /sheet4/i.test(n));
    if (sheet4Name) {
      const sheet4 = XLSX.utils.sheet_to_json(wb.Sheets[sheet4Name], { header: 1, defval: null });
      parseSheet4(sheet4);
    }

    const now = new Date();
    const badge = document.getElementById('dataBadge');
    badge.textContent = '✓ 已加载';
    badge.className = 'header-badge loaded';
    document.getElementById('updateTime').textContent =
      '数据更新于 ' + now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0');

    renderToday();
    renderDeposits();
    renderHistory();
    renderLeaderboard();
    initScrollReveal();
  } catch (err) {
    showError(err.message);
  }
}

function parseSheet1(rows) {
  if (!rows || rows.length < 2) return [];
  const out = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || !r[0]) continue;
    const c = {
      name: String(r[0]).trim(),
      price: toNum(r[1]),
      status: r[2] ? String(r[2]).trim() : '',
      kw2: toNum(r[3]),
      kw3: toNum(r[4]),
      tiers: []
    };
    for (let col = 5; col < r.length; col += 3) {
      const price = toNum(r[col + 1]);
      const pool = toNum(r[col + 2]);
      if (price !== null && price !== undefined) {
        c.tiers.push({ p: price, pool: pool || 0 });
      }
    }
    out.push(c);
  }
  return out;
}

function parseSheet2(rows) {
  if (!rows || rows.length < 2) return;
  const headerRow = rows[0] || [];
  histDates = [];
  for (let i = 2; i < headerRow.length; i++) {
    if (headerRow[i] !== null && headerRow[i] !== undefined && headerRow[i] !== '') {
      histDates.push(String(headerRow[i]).trim());
    }
  }
  histRows = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r) continue;
    const name = r[1] ? String(r[1]).trim() : '';
    if (!name) continue;
    const values = [];
    for (let j = 2; j < 2 + histDates.length; j++) {
      values.push(toNum(r[j]));
    }
    histRows.push({ n: name, v: values });
  }
}

// 解析 Sheet4 — 今日存款
function parseSheet4(rows) {
  if (!rows || rows.length < 2) return;
  depositData = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || !r[2]) continue;  // 客户简称必须存在
    const dateSerial = toNum(r[0]);
    const account = r[1] ? String(r[1]).trim() : '';
    const customer = String(r[2]).trim();
    const customerId = r[3] !== null && r[3] !== undefined ? String(r[3]).trim() : '';
    const amount = toNum(r[4]);
    const price = toNum(r[5]);
    if (!amount) continue;
    depositData.push({
      date: excelDateToStr(dateSerial),
      account: account,
      customer: customer,
      customerId: customerId,
      amount: amount,
      price: price
    });
  }
}

// Excel 序列号转日期
function excelDateToStr(serial) {
  if (!serial) return '';
  const utc_days = Math.floor(serial - 25569);
  const utc_value = utc_days * 86400;
  const date = new Date(utc_value * 1000);
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
}

function toNum(v) {
  if (v === null || v === undefined || v === '') return null;
  if (typeof v === 'number') return v;
  const s = String(v).trim();
  if (s === '' || s === '未找到' || s === '相等' || s === '不相等') return null;
  const n = parseFloat(s.replace(/,/g, ''));
  return isNaN(n) ? null : n;
}

// ============ 格式化 ============
function fmtPool(v) {
  if (v === 0 || v === null || v === undefined) return '—';
  const abs = Math.abs(v);
  const sign = v < 0 ? '-' : '+';
  return sign + fmtIDR(abs);
}

function fmtIDR(abs) {
  if (abs >= 1e6) {
    const tiao = abs / 1e6;
    const s = parseFloat(tiao.toFixed(2));
    return s + '条';
  }
  if (abs >= 1000) {
    const k = abs / 1000;
    const s = parseFloat(k.toFixed(1));
    return s + 'k';
  }
  return abs.toLocaleString();
}

function fmtPrice(v) {
  if (!v) return '—';
  return fmtIDR(Math.abs(v));
}

// 数字滚动动画
function animateCountUp() {
  const els = document.querySelectorAll('.count-up');
  els.forEach(el => {
    const target = parseInt(el.dataset.target || '0', 10);
    if (isNaN(target) || target === 0) { el.textContent = target; return; }
    const duration = 1000;
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      // easeOutCubic
      const eased = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(target * eased);
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

// 大数字格式化动画 (IDR 总额)
function animateBigNumber(id, target, duration) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    const v = target * eased;
    el.textContent = fmtIDR(v);
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// 滚动驱动动画 — IntersectionObserver
function initScrollReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

  document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
}

// ============ 排行榜 ============
const PRAISE_TEXTS = [
  '🌟 财神爷亲自点名！',
  '💎 富可敌国，传奇人物！',
  '👑 砖界首富，无人能及！',
  '🚀 资金池深如宇宙！',
  '🏆 商场常胜，战无不胜！'
];

let crownPraiseIndex = {};

function renderLeaderboard() {
  // 计算每个客户的资金池总计
  const poolMap = {};
  allClients.forEach(c => {
    let total = 0;
    c.tiers.forEach(t => { total += (t.pool || 0); });
    poolMap[c.name] = total;
  });

  const sorted = Object.entries(poolMap).sort((a, b) => b[1] - a[1]);
  const top5Rich = sorted.slice(0, 5);
  const top5Poor = [...sorted].sort((a, b) => a[1] - b[1]).slice(0, 5);
  const maxRich = top5Rich[0] ? Math.abs(top5Rich[0][1]) : 1;
  const maxPoor = top5Poor[0] ? Math.abs(top5Poor[0][1]) : 1;

  function buildRichCard(entry, rank) {
    const [name, amount] = entry;
    const isTop1 = rank === 1;
    const barW = Math.round((Math.abs(amount) / maxRich) * 100);
    const praiseIdx = crownPraiseIndex[name] || 0;

    const crownHtml = isTop1 ? `
      <div class="crown-wrapper" id="crown-${name}" onclick="clickCrown('${name}')">
        <div class="crown-glow"></div>
        <div class="crown-stars">
          <span class="star-particle">⭐</span>
          <span class="star-particle">✨</span>
          <span class="star-particle">💫</span>
        </div>
        <span class="crown-emoji">👑</span>
        <div class="praise-bubble" id="praise-${name}">${PRAISE_TEXTS[praiseIdx]}</div>
      </div>` : `<span style="font-size:26px">${rank===2?'🥈':'🥉'}</span>`;

    return `<div class="lb-card rank-${rank}" style="animation-delay:${0.1*rank}s">
      <div class="lb-rank">${rank}</div>
      ${crownHtml}
      <div class="lb-info">
        <div class="lb-name">${name}</div>
        <div class="lb-amount">+${fmtIDR(Math.abs(amount))}</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${barW}%"></div></div>
      </div>
    </div>`;
  }

  function buildPoorCard(entry, rank) {
    const [name, amount] = entry;
    const barW = Math.round((Math.abs(amount) / maxPoor) * 100);
    const poopHtml = `
      <div class="poop-wrapper">
        <div class="fly-container">
          <span class="fly">🪰</span>
          <span class="fly">🪰</span>
          <span class="fly">🪰</span>
        </div>
        <span class="poop-emoji">💩</span>
      </div>`;

    return `<div class="lb-card" style="border-color:#fca5a5; background:linear-gradient(135deg,#fff5f5,#fee2e2); animation-delay:${0.1*rank}s">
      <div class="lb-rank" style="color:#dc2626">${rank}</div>
      ${poopHtml}
      <div class="lb-info">
        <div class="lb-name">${name}</div>
        <div class="lb-amount negative">${fmtPool(amount)}</div>
        <div class="lb-bar-wrap"><div class="lb-bar negative" style="width:${barW}%"></div></div>
      </div>
    </div>`;
  }

  // 4-5名无特效
  function buildSimpleRichCard(entry, rank) {
    const [name, amount] = entry;
    const barW = Math.round((Math.abs(amount) / maxRich) * 100);
    return `<div class="lb-card" style="animation-delay:${0.1*rank}s">
      <div class="lb-rank">${rank}</div>
      <span style="font-size:22px">🎖️</span>
      <div class="lb-info">
        <div class="lb-name">${name}</div>
        <div class="lb-amount">+${fmtIDR(Math.abs(amount))}</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${barW}%"></div></div>
      </div>
    </div>`;
  }

  function buildSimplePoorCard(entry, rank) {
    const [name, amount] = entry;
    const barW = Math.round((Math.abs(amount) / maxPoor) * 100);
    return `<div class="lb-card" style="border-color:#fca5a5; background:#fff5f5; animation-delay:${0.1*rank}s">
      <div class="lb-rank" style="color:#dc2626">${rank}</div>
      <span style="font-size:22px">😰</span>
      <div class="lb-info">
        <div class="lb-name">${name}</div>
        <div class="lb-amount negative">${fmtPool(amount)}</div>
        <div class="lb-bar-wrap"><div class="lb-bar negative" style="width:${barW}%"></div></div>
      </div>
    </div>`;
  }

  const richCards = top5Rich.map((e, i) => {
    if (i < 3) return buildRichCard(e, i+1);
    return buildSimpleRichCard(e, i+1);
  }).join('');

  const poorCards = top5Poor.map((e, i) => {
    if (i === 0) return buildPoorCard(e, i+1);
    return buildSimplePoorCard(e, i+1);
  }).join('');

  // ── 价格排行榜（现行价格：资金池不为0的tier中最低价格；无则退回今日手填价格）──
  const priceList = [];
  allClients.forEach(c => {
    const nonZeroTiers = c.tiers.filter(t => t.pool !== 0 && t.pool !== null && t.pool !== undefined);
    if (nonZeroTiers.length > 0) {
      const minPriceTier = nonZeroTiers.reduce((a, b) => a.p < b.p ? a : b);
      priceList.push([c.name, minPriceTier.p]);
    } else if (c.price !== null && c.price !== undefined) {
      priceList.push([c.name, c.price]);
    }
  });

  const top5HighPrice = [...priceList].sort((a, b) => b[1] - a[1]).slice(0, 5);
  const top5LowPrice  = [...priceList].sort((a, b) => a[1] - b[1]).slice(0, 5);
  const maxPrice = top5HighPrice[0] ? top5HighPrice[0][1] : 1;
  const minPriceRef = top5HighPrice[0] ? top5HighPrice[0][1] : 1; // bar relative to max

  function buildPriceCard(entry, rank, isHigh) {
    const [name, price] = entry;
    const barW = Math.round((price / maxPrice) * 100);
    const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
    const medal = medals[rank - 1] || rank;
    const cardBg = isHigh
      ? (rank === 1 ? 'background:linear-gradient(135deg,#fefce8,#fef9c3);border-color:#facc15;'
        : rank === 2 ? 'background:linear-gradient(135deg,#f8fafc,#e2e8f0);border-color:#94a3b8;'
        : rank === 3 ? 'background:linear-gradient(135deg,#fff7ed,#fed7aa);border-color:#f97316;' : '')
      : (rank === 1 ? 'background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#4ade80;'
        : rank === 2 ? 'background:linear-gradient(135deg,#f0fdfa,#ccfbf1);border-color:#2dd4bf;'
        : rank === 3 ? 'background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:#60a5fa;' : '');
    const barColor = isHigh
      ? 'background:linear-gradient(90deg,#f59e0b,#fbbf24);'
      : 'background:linear-gradient(90deg,#4ade80,#22d3ee);';
    const amtColor = isHigh ? 'color:#b45309;' : 'color:#15803d;';
    const fireIcon = isHigh && rank === 1 ? '🔥' : (!isHigh && rank === 1 ? '💚' : '');

    return `<div class="lb-card" style="${cardBg} animation-delay:${0.08*rank}s">
      <div class="lb-rank" style="font-size:20px">${medal}</div>
      <span style="font-size:26px">${fireIcon || (isHigh ? '📈' : '📉')}</span>
      <div class="lb-info">
        <div class="lb-name">${name}</div>
        <div class="lb-amount" style="${amtColor} font-size:15px">${fmtPrice(price)}</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${barW}%;${barColor}"></div></div>
      </div>
    </div>`;
  }

  const highPriceCards = top5HighPrice.map((e, i) => buildPriceCard(e, i+1, true)).join('');
  const lowPriceCards  = top5LowPrice.map((e, i) => buildPriceCard(e, i+1, false)).join('');

  // ── 资金池价格排行：每个客户"最低且不为0的资金池"所对应的价格 ──
  const poolPriceList = [];
  allClients.forEach(c => {
    // 找出所有 pool != 0 的 tier，取 pool 绝对值最小的那个
    const nonZeroTiers = c.tiers.filter(t => t.pool !== 0 && t.pool !== null && t.pool !== undefined);
    if (nonZeroTiers.length === 0) return;
    const minTier = nonZeroTiers.reduce((a, b) => Math.abs(a.pool) < Math.abs(b.pool) ? a : b);
    if (minTier && minTier.p) {
      poolPriceList.push([c.name, minTier.p, minTier.pool]);
    }
  });

  const top5HighPoolPrice = [...poolPriceList].sort((a, b) => b[1] - a[1]).slice(0, 5);
  const top5LowPoolPrice  = [...poolPriceList].sort((a, b) => a[1] - b[1]).slice(0, 5);
  const maxPoolPrice = top5HighPoolPrice[0] ? top5HighPoolPrice[0][1] : 1;

  function buildPoolPriceCard(entry, rank, isHigh) {
    const [name, price, pool] = entry;
    const barW = Math.round((price / maxPoolPrice) * 100);
    const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
    const medal = medals[rank - 1] || rank;
    const isPos = pool > 0;
    const poolTag = `<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:${isPos?'rgba(22,163,74,0.12)':'rgba(220,38,38,0.1)'};color:${isPos?'#15803d':'#dc2626'};margin-left:4px">${fmtPool(pool)}</span>`;
    const cardBg = isHigh
      ? (rank===1 ? 'background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#f59e0b;'
        : rank===2 ? 'background:linear-gradient(135deg,#f8fafc,#e2e8f0);border-color:#94a3b8;'
        : rank===3 ? 'background:linear-gradient(135deg,#fff7ed,#fed7aa);border-color:#f97316;' : '')
      : (rank===1 ? 'background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-color:#34d399;'
        : rank===2 ? 'background:linear-gradient(135deg,#f0fdfa,#ccfbf1);border-color:#2dd4bf;'
        : rank===3 ? 'background:linear-gradient(135deg,#eff6ff,#dbeafe);border-color:#60a5fa;' : '');
    const barColor = isHigh
      ? 'background:linear-gradient(90deg,#f59e0b,#fbbf24);'
      : 'background:linear-gradient(90deg,#34d399,#22d3ee);';
    const amtColor = isHigh ? 'color:#92400e;' : 'color:#065f46;';
    const icon = isHigh ? (rank===1?'🔺':'📈') : (rank===1?'🔻':'📉');

    return `<div class="lb-card" style="${cardBg} animation-delay:${0.08*rank}s">
      <div class="lb-rank" style="font-size:20px">${medal}</div>
      <span style="font-size:26px">${icon}</span>
      <div class="lb-info">
        <div class="lb-name">${name}${poolTag}</div>
        <div class="lb-amount" style="${amtColor} font-size:15px">${fmtPrice(price)}</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${barW}%;${barColor}"></div></div>
      </div>
    </div>`;
  }

  const highPoolPriceCards = top5HighPoolPrice.map((e, i) => buildPoolPriceCard(e, i+1, true)).join('');
  const lowPoolPriceCards  = top5LowPoolPrice.map((e, i) => buildPoolPriceCard(e, i+1, false)).join('');

  // ── 分隔线 ──
  const divider = `<div style="display:flex;align-items:center;gap:10px;margin:20px 0 4px">
    <div style="flex:1;height:1px;background:var(--border)"></div>
    <div style="font-size:11px;color:var(--text3);letter-spacing:2px;font-family:var(--mono)">PRICE RANKING</div>
    <div style="flex:1;height:1px;background:var(--border)"></div>
  </div>`;

  const divider2 = `<div style="display:flex;align-items:center;gap:10px;margin:20px 0 4px">
    <div style="flex:1;height:1px;background:var(--border)"></div>
    <div style="font-size:11px;color:var(--text3);letter-spacing:2px;font-family:var(--mono)">MIN POOL PRICE RANKING</div>
    <div style="flex:1;height:1px;background:var(--border)"></div>
  </div>`;

  document.getElementById('leaderboardContent').innerHTML = `
    <div class="lb-hero">
      <div class="lb-hero-icon">🏆</div>
      <div class="lb-hero-title">排行榜总览</div>
      <div class="lb-hero-sub">POOL &amp; PRICE LEADERBOARD · TOP 5</div>
    </div>

    <div class="leaderboard-section">
      <div class="lb-header">
        <div class="lb-title">💰 资金最多 TOP 5</div>
        <div class="lb-subtitle">点击皇冠换赞美</div>

      ${richCards}
    </div>

    <div class="leaderboard-section" style="margin-top:24px">

      </div>
      ${poorCards}
    </div>

    ${divider}

    <div class="leaderboard-section" style="margin-top:16px">
      <div class="lb-header">
        <div class="lb-title">🔥 价格最高 TOP 5</div>

      <div class="lb-header">
        <div class="lb-title">💚 价格最低 TOP 5</div>

      </div>
      ${lowPriceCards}
    </div>

    ${divider2}

    <div class="leaderboard-section" style="margin-top:16px">
      <div class="lb-header">
        <div class="lb-title">🔺 最小资金池价格 最高 TOP 5</div>
        <div class="lb-subtitle">最小非零资金池所在档价格</div>
      </div>
      ${highPoolPriceCards}

    <div class="leaderboard-section" style="margin-top:24px">
      <div class="lb-header">
        <div class="lb-title">🔻 最小资金池价格 最低 TOP 5</div>

function clickCrown(name) {

// ============ 敲砖游戏 ============
const GAME_INITIAL_FUND = 100000000;  // 100条
const GAME_COST_PER_KNOCK = 10000000; // 10条每次

let gameState = {
  fund: GAME_INITIAL_FUND,
  round: 0,
  totalWon: 0,
  totalLost: 0,
  log: [],
  pool: [],        // 未揭示客户列表
  revealed: [],    // 已揭示
  isOver: false,
  isKnocking: false
};

function buildGamePool() {
  // 基于 allClients 构建资金池总计
  return allClients.map(c => {
    let total = 0;
    c.tiers.forEach(t => { total += (t.pool || 0); });
    return { name: c.name, pool: total };
  }).filter(c => c.pool !== 0); // 只保留有资金变动的客户
}

function initGame() {
  gameState = {
    fund: GAME_INITIAL_FUND,
    round: 0,
    totalWon: 0,
    totalLost: 0,
    log: [],
    pool: buildGamePool().sort(() => Math.random() - 0.5), // 随机打乱
    revealed: [],
    isOver: false,
    isKnocking: false
  };
  renderGame();
}

function renderGame() {
  const el = document.getElementById('gameContent');
  if (!el) return;

  const pct = Math.max(0, Math.min(100, (gameState.fund / GAME_INITIAL_FUND) * 100));
  const barClass = pct < 20 ? 'danger' : pct < 50 ? 'warning' : '';
  const fundClass = gameState.fund >= 0 ? 'positive' : 'negative';
  const canKnock = gameState.fund > 0 && !gameState.isOver && gameState.pool.length > 0;

  const logHtml = [...gameState.log].reverse().slice(0, 20).map(entry => {
    const isWin = entry.pool > 0;
    return `<div class="game-log-entry">
      <span class="log-icon">${isWin ? '💰' : '💸'}</span>
      <div class="log-text">
        <div class="log-name">${entry.name}</div>
        <div class="log-amount ${isWin ? 'green' : 'red'}">${isWin ? '+' : ''}${fmtIDR(entry.pool)} 资金池</div>
      </div>
      <div class="log-round">第${entry.round}次</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="game-header">
      <div class="game-title-row">
        <div class="game-title">🧱 敲砖游戏</div>
        <button class="game-reset-btn" onclick="initGame()">🔄 重置</button>
      </div>
      <div class="game-fund-display">
        <div class="game-fund-label">当前资金</div>
        <div class="game-fund-amount ${fundClass}" id="gameFundNum">${fmtIDR(Math.abs(gameState.fund))}</div>
        <div class="game-fund-unit">${gameState.fund >= 0 ? '' : '亏损 '}IDR</div>
      </div>
      <div class="game-fund-bar-track">
        <div class="game-fund-bar-fill ${barClass}" id="gameFundBar" style="width:${pct}%"></div>
      </div>
      <div class="game-stats-row">
        <div class="game-stat">
          <div class="game-stat-num">${gameState.round}</div>
          <div class="game-stat-label">已敲次数</div>
        </div>
        <div class="game-stat">
          <div class="game-stat-num" style="color:#4ade80">${gameState.pool.length}</div>
          <div class="game-stat-label">剩余砖块</div>
        </div>
        <div class="game-stat">
          <div class="game-stat-num" style="color:#f87171">${fmtIDR(GAME_COST_PER_KNOCK)}</div>
          <div class="game-stat-label">每次费用</div>
        </div>
      </div>
    </div>

    <div class="game-brick-arena" id="brickArena">
      <div class="brick-label" style="position:relative;z-index:2;pointer-events:none;margin-bottom:10px;text-align:center">
        <div style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:2px;font-family:var(--mono);margin-bottom:12px">
          ${gameState.pool.length > 0 ? `${gameState.pool.length} 块砖待敲 · 随机揭示客户` : '砖块已全部敲完！'}
        </div>
      </div>
      <div class="game-brick ${canKnock ? '' : 'disabled'}" id="mainBrick" onclick="${canKnock ? 'knockBrick(event)' : ''}">
        <div class="brick-label">
          <div class="brick-q">?</div>
          <div class="brick-hint">点击敲击</div>
        </div>
      </div>
      <button class="game-knock-btn" id="knockBtn" ${canKnock ? '' : 'disabled'} onclick="knockBrick(event)">敲 击</button>
      <div class="knock-cost">每次消耗 ${fmtIDR(GAME_COST_PER_KNOCK)} · 初始资金 ${fmtIDR(GAME_INITIAL_FUND)}</div>
    </div>

    <div class="game-log">
      <div class="game-log-header">
        <div class="game-log-title">📜 敲击记录</div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${gameState.round} 次</div>
      </div>
      <div class="game-log-body" id="gameLogBody">
        ${gameState.log.length === 0
          ? '<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px">暂无记录，开始敲砖！</div>'
          : logHtml}
      </div>
    </div>
  `;

  if (gameState.isOver) showGameOver();
}

function knockBrick(e) {
  if (gameState.isKnocking || gameState.isOver) return;
  if (gameState.fund <= 0) { showGameOver(); return; }
  if (gameState.pool.length === 0) return;

  gameState.isKnocking = true;

  // 扣费
  gameState.fund -= GAME_COST_PER_KNOCK;
  gameState.round++;

  // 敲击动画
  const brick = document.getElementById('mainBrick');
  const arena = document.getElementById('brickArena');
  if (brick) {
    brick.classList.add('cracked');
    spawnParticles(brick);
    setTimeout(() => { brick.classList.add('opened'); }, 150);
  }
  if (arena) {
    arena.classList.add('shaking');
    setTimeout(() => arena.classList.remove('shaking'), 400);
  }

  // 随机取一个客户
  const idx = Math.floor(Math.random() * gameState.pool.length);
  const client = gameState.pool.splice(idx, 1)[0];
  gameState.revealed.push(client);

  // 加入资金
  gameState.fund += client.pool;

  // 记录日志
  gameState.log.push({ name: client.name, pool: client.pool, round: gameState.round });

  // 统计
  if (client.pool > 0) gameState.totalWon += client.pool;
  else gameState.totalLost += Math.abs(client.pool);

  // 显示 CG
  setTimeout(() => {
    showCg(client, gameState.fund);
    gameState.isKnocking = false;
  }, 600);
}

function spawnParticles(brick) {
  const arena = document.getElementById('brickArena');
  if (!arena || !brick) return;
  const rect = brick.getBoundingClientRect();
  const arenaRect = arena.getBoundingClientRect();
  const cx = rect.left - arenaRect.left + rect.width / 2;
  const cy = rect.top - arenaRect.top + rect.height / 2;

  const colors = ['#c8b89a', '#b8a080', '#a08860', '#8b7355', '#d4c4a8', '#f0ebe0'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'brick-particle';
    const size = 4 + Math.random() * 10;
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist = 40 + Math.random() * 80;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      left:${cx}px; top:${cy}px;
      --tx: translate(${dx}px, ${dy}px);
      --rot: ${(Math.random() - 0.5) * 720}deg;
      animation-duration: ${0.5 + Math.random() * 0.5}s;
      animation-delay: ${Math.random() * 0.1}s;
    `;
    arena.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

function showCg(client, newFund) {
  const isWin = client.pool > 0;
  const isGameOver = newFund <= 0;
  const type = isGameOver ? 'lose' : (isWin ? 'win' : 'lose');

  const overlay = document.getElementById('gameCgOverlay');
  const card = document.getElementById('cgCard');
  const icon = document.getElementById('cgIcon');
  const name = document.getElementById('cgName');
  const amount = document.getElementById('cgAmount');
  const desc = document.getElementById('cgDesc');
  const bar = document.getElementById('cgBar');
  const btn = document.getElementById('cgBtn');
  const banner = document.getElementById('cgBanner');
  const confetti = document.getElementById('cgConfetti');

  // 重置动画
  card.className = 'cg-card ' + type;
  card.style.transform = 'scale(0.3) rotate(-10deg)';
  card.style.opacity = '0';

  // 设置内容
  banner.textContent = isGameOver ? 'GAME OVER' : (isWin ? 'WIN' : 'LOSE');
  icon.textContent = isGameOver ? '💥' : (isWin ? '🤑' : '😱');
  name.textContent = client.name;
  amount.className = 'cg-pool-amount ' + (client.pool >= 0 ? 'win' : 'lose');
  amount.textContent = (client.pool >= 0 ? '+' : '') + fmtIDR(client.pool);
  bar.className = 'cg-fx-bar ' + type;
  btn.className = 'cg-continue-btn ' + type;

  if (isGameOver) {
    desc.textContent = `💀 资金耗尽！${client.name} 的巨额欠款压垮了你。共敲了 ${gameState.round} 次砖。`;
    btn.textContent = '查看结果';
  } else if (isWin) {
    const msgs = [
      `🎉 太厉害了！${client.name} 的资金池进账丰厚！`,
      `💰 恭喜！${client.name} 贡献了大量资金！`,
      `🚀 ${client.name} 是个大金主，赚翻了！`,
      `✨ 运气爆棚！${client.name} 的砖里藏着宝！`,
    ];
    desc.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    btn.textContent = '继续敲！';
  } else {
    const msgs = [
      `😰 ${client.name} 欠款累累，资金受损！`,
      `💸 惨！${client.name} 是个大债主，亏了！`,
      `😬 ${client.name} 的坑太深了…小心为妙！`,
      `📉 ${client.name} 拖累了你的资金池！`,
    ];
    desc.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    btn.textContent = gameState.fund > 0 ? '再试一次！' : '游戏结束';
  }

  // 撒彩带（赢的时候）
  confetti.innerHTML = '';
  if (isWin && !isGameOver) {
    const confettiColors = ['#4ade80', '#22d3ee', '#f59e0b', '#f87171', '#a78bfa', '#fb7185'];
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        background: ${confettiColors[Math.floor(Math.random() * confettiColors.length)]};
        --dx: ${(Math.random() - 0.5) * 200}px;
        --rot: ${Math.random() * 720}deg;
        animation-duration: ${1 + Math.random() * 1}s;
        animation-delay: ${Math.random() * 0.4}s;
        width: ${4 + Math.random() * 8}px;
        height: ${4 + Math.random() * 8}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      `;
      confetti.appendChild(p);
    }
  }

  // 屏幕闪光
  const flash = document.getElementById('screenFlash');
  if (flash) {
    flash.className = 'screen-flash ' + (isWin ? 'flash-green' : 'flash-red');
    setTimeout(() => flash.className = 'screen-flash', 600);
  }

  // 激活覆层
  overlay.classList.add('active');
  requestAnimationFrame(() => {
    card.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s';
    card.style.transform = '';
    card.style.opacity = '';
  });
}

function closeCg() {
  const overlay = document.getElementById('gameCgOverlay');
  const card = document.getElementById('cgCard');
  card.style.transition = 'transform 0.3s ease, opacity 0.3s';
  card.style.transform = 'scale(0.8)';
  card.style.opacity = '0';
  setTimeout(() => {
    overlay.classList.remove('active');
    // 检查游戏是否结束
    if (gameState.fund <= 0) {
      gameState.isOver = true;
    }
    renderGame();
    // 滚动到顶部
    const gc = document.getElementById('gameContent');
    if (gc) gc.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 300);
}

function showGameOver() {
  // 游戏结束时显示最终弹窗 (通过 CG 系统展示)
  const totalRounds = gameState.round;
  const netGain = gameState.fund - GAME_INITIAL_FUND + (totalRounds * GAME_COST_PER_KNOCK);
  const el = document.getElementById('gameContent');
  if (!el) return;
  // 在 renderGame 之后直接在 brickArena 内插入游戏结束覆层
  const arena = document.getElementById('brickArena');
  if (!arena) return;
  const over = document.createElement('div');
  over.id = 'gameOverInner';
  over.style.cssText = 'position:absolute;inset:0;z-index:50;background:rgba(0,0,0,0.85);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;backdrop-filter:blur(4px);animation:fadeIn 0.5s ease';
  over.innerHTML = `
    <div style="font-size:64px;margin-bottom:12px;animation:cgIconBounce 0.8s cubic-bezier(0.34,1.56,0.64,1)">💀</div>
    <div style="font-size:26px;font-weight:900;color:#f87171;letter-spacing:3px;margin-bottom:8px">游戏结束</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.7);line-height:1.7;margin-bottom:20px">
      共敲了 <b style="color:#f59e0b">${totalRounds}</b> 次砖块<br>
      资金已耗尽，无法继续敲击
    </div>
    <button onclick="initGame()" style="background:linear-gradient(135deg,#d97706,#f59e0b);border:none;border-radius:50px;padding:13px 36px;color:#fff;font-size:16px;font-weight:900;font-family:var(--sans);letter-spacing:3px;cursor:pointer;box-shadow:0 6px 20px rgba(217,119,6,0.5)">重新开始</button>
  `;
  arena.appendChild(over);
}

// 初始化游戏面板（在 allClients 加载后调用）
function renderGamePanel() {
  if (!document.getElementById('gameContent')) return;
  if (gameState.pool.length === 0 && gameState.round === 0) {
    initGame();
  } else {
    renderGame();
  }
}

// ============ 标签切换 ============
function switchTab(i) {
  document.querySelectorAll('.panel').forEach((p,j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', j === i));
  document.querySelectorAll('.nav-item').forEach((n,j) => n.classList.toggle('active', j === i));
  if (i === 4) renderGamePanel();
}

</script>
